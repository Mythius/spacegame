<!DOCTYPE html>
<html>
<head>
	<title>Spaceship Game</title>
	<link rel="shortcut icon" href="./favicon.ico">
	<link rel="stylesheet" href="style.css">
	<link href="https://fonts.googleapis.com/css?family=Audiowide&display=swap" rel="stylesheet">
	<script src=/socket.io/socket.io.js></script>
	<script src="helpers.js"></script>
	<style>
		#build {
			display: none;
			position: fixed;
			inset: 0;
			background: #03060f;
		}
		#build-canvas {
			display: block;
			opacity: 1;
		}
		#build-ui {
			position: fixed;
			top: 0; left: 0;
			width: 180px;
			height: 100vh;
			background: rgba(0,0,0,0.75);
			border-right: 1px solid #222;
			display: flex;
			flex-direction: column;
			box-sizing: border-box;
			padding: 12px 10px;
			gap: 8px;
			font-family: monospace;
		}
		#build-ui h3 {
			margin: 0 0 4px;
			font-size: 12px;
			color: #4af;
			text-transform: uppercase;
			letter-spacing: 1px;
			border-bottom: 1px solid #1a3a5a;
			padding-bottom: 6px;
		}
		#build-palette {
			flex: 1;
			overflow-y: auto;
			display: flex;
			flex-direction: column;
			gap: 4px;
		}
		#build-palette::-webkit-scrollbar { width: 3px; }
		#build-palette::-webkit-scrollbar-thumb { background: #333; }
		.palette-btn {
			width: 100%;
			padding: 6px 8px;
			background: #0a0a14;
			border: 1px solid #2a2a3a;
			color: #aaa;
			font-family: monospace;
			font-size: 11px;
			cursor: pointer;
			text-align: left;
			letter-spacing: 0.5px;
		}
		.palette-btn:hover { background: #12122a; color: white; }
		.palette-btn.selected { background: #0a1f3a; border-color: #4af; color: #7cf; }
		#build-size-label {
			font-size: 11px;
			color: #7cf;
			padding: 4px 0;
			letter-spacing: 0.5px;
		}
		#build-hint {
			font-size: 10px;
			color: #444;
			line-height: 1.6;
		}
		#build-back {
			padding: 7px;
			background: #100a0a;
			border: 1px solid #3a1a1a;
			color: #a66;
			font-family: monospace;
			font-size: 11px;
			cursor: pointer;
		}
		#build-back:hover { background: #1e1010; color: #f88; }
		#build-mode-btn {
			margin-top: 10px;
		}
	</style>
</head>
<body>
	<login>
		<h1>Spaceship Game</h1>
		<input id=name placeholder="Enter your username">
		<br>
		<button id=start>Begin your quest</button>
		<button id="build-mode-btn" onclick="startBuildMode()">Build Mode</button>
		<div style="margin-top:18px;border-top:1px solid #333;padding-top:14px;display:flex;gap:8px;">
			<a href="editor.html" style="flex:1;display:block;padding:8px;background:#0a0a1a;border:1px solid #2a2a5a;color:#7af;font-family:monospace;font-size:0.7em;letter-spacing:1px;text-decoration:none;transition:background .3s;">Shape Editor</a>
			<a href="beam_editor.html" style="flex:1;display:block;padding:8px;background:#0a1a0a;border:1px solid #2a5a2a;color:#5f8;font-family:monospace;font-size:0.7em;letter-spacing:1px;text-decoration:none;transition:background .3s;">Beam Editor</a>
		</div>
	</login>
	<div id="build">
		<canvas id="build-canvas"></canvas>
		<div id="build-ui">
			<h3>Assets</h3>
			<div id="build-palette"></div>
			<div id="build-size-label">Size: 2 cells</div>
		<div id="build-hint">
				Click — place<br>
				Right click — remove<br>
				WASD — pan<br>
				Scroll — zoom<br>
				Ctrl+Scroll — resize<br>
				Esc — deselect
			</div>
			<button id="build-back" onclick="exitBuildMode()">← Back</button>
		</div>
	</div>
	<lobby>
		<left>
			<h2>Players</h2><hr>
			<div id=players></div>
		</left>
		<main>
			<h2>Game</h2><hr>
			<button id=launch>Launch Game</button><br><br>
		</main>
	</lobby>
	<game>
		<canvas id=gamecanvas></canvas>
	</game>
	<script src="main.js"></script>
	<script src="game.js"></script>
	<script src="polar-object.js"></script>
	<script src="build_system.js"></script>
</body>
</html>
