<!DOCTYPE html>
<html>
<head>
	<title>Spaceship Game</title>
	<link rel="shortcut icon" href="./favicon.ico">
	<link rel="stylesheet" href="style.css">
	<link href="https://fonts.googleapis.com/css?family=Audiowide&display=swap" rel="stylesheet">
	<script src=/socket.io/socket.io.js></script>
	<script src="/shared/constants.js"></script>
	<script src="/shared/worldgen.js"></script>
	<script src="helpers.js"></script>
	<style>
		/* ── Stacking order ───────────────────────────────────────────── */
		/* #build has no z-index by default → sits behind login/lobby/game
		   (all of which are later in DOM or have explicit z-index).
		   startBuildMode() raises it to z-index:999; exitBuildMode drops it back. */
		game  { z-index: 1; }

		/* ── Build canvas — always rendered, z-index toggled by JS ───── */
		#build {
			display: block;
			position: fixed;
			inset: 0;
		}
		#build-canvas {
			position: absolute;
			inset: 0;
			width: 100%;
			height: 100%;
			display: block;
			background: transparent;
		}

		/* ── Build UI panel (floats on left, above canvas) ────────────── */
		#build-ui {
			display: none;   /* shown only in active build mode */
			position: fixed;
			z-index: 3;
			top: 0; left: 0;
			width: 200px;
			height: 100vh;
			background: rgba(4,8,20,0.88);
			border-right: 1px solid #1a2a3a;
			flex-direction: column;
			box-sizing: border-box;
			padding: 14px 10px 10px;
			gap: 6px;
			font-family: monospace;
		}
		#build-ui h3 {
			margin: 0 0 6px;
			font-size: 11px;
			color: #4af;
			text-transform: uppercase;
			letter-spacing: 1.5px;
			border-bottom: 1px solid #1a3a5a;
			padding-bottom: 6px;
		}
		#build-palette {
			flex: 1;
			overflow-y: auto;
			display: flex;
			flex-direction: column;
			gap: 5px;
		}
		#build-palette::-webkit-scrollbar { width: 3px; }
		#build-palette::-webkit-scrollbar-thumb { background: #2a3a4a; }

		/* ── Building cards ───────────────────────────────────────────── */
		.building-card {
			padding: 8px 9px;
			background: #060d1a;
			border: 1px solid #1a2a3a;
			color: #8aa;
			cursor: pointer;
			border-radius: 3px;
			transition: border-color .15s, background .15s;
		}
		.building-card:hover { background: #0a1628; border-color: #2a4a6a; }
		.building-card.selected { background: #0a1f3a; border-color: #4af; }
		.bcard-name {
			font-size: 12px;
			color: #cde;
			font-weight: bold;
			margin-bottom: 3px;
		}
		.building-card.selected .bcard-name { color: #7cf; }
		.bcard-meta {
			font-size: 10px;
			color: #567;
			margin-bottom: 4px;
		}
		.bcard-cost { display: flex; flex-wrap: wrap; gap: 3px; margin-bottom: 3px; }
		.bcard-res {
			font-size: 10px;
			background: #0d1a0d;
			border: 1px solid #1a3a1a;
			color: #6a9;
			padding: 1px 5px;
			border-radius: 2px;
		}
		.bcard-desc {
			font-size: 9px;
			color: #456;
			line-height: 1.4;
			margin-top: 2px;
		}

		/* ── Hint + back button ───────────────────────────────────────── */
		#build-hint {
			font-size: 9px;
			color: #334;
			line-height: 1.7;
			border-top: 1px solid #111a22;
			padding-top: 6px;
		}
		#build-back {
			padding: 7px;
			background: #0f0a0a;
			border: 1px solid #2a1a1a;
			color: #966;
			font-family: monospace;
			font-size: 11px;
			cursor: pointer;
			border-radius: 3px;
		}
		#build-back:hover { background: #1e1010; color: #f88; }
		#build-mode-btn { margin-top: 10px; }
	</style>
</head>
<body>
	<!-- Build canvas is FIRST in DOM so it sits behind login/lobby/game at z-index:auto.
	     startBuildMode raises it to z-index:999; exitBuildMode drops it back. -->
	<div id="build">
		<canvas id="build-canvas"></canvas>
		<div id="build-ui">
			<h3>Buildings</h3>
			<div id="build-palette"></div>
			<div id="build-hint">
				Click — place<br>
				Right-click — remove<br>
				WASD — pan<br>
				Scroll — zoom<br>
				Esc — deselect<br>
				B — close
			</div>
			<button id="build-back" onclick="exitBuildMode()">← Back to game</button>
		</div>
	</div>
	<login>
		<h1>Spaceship Game</h1>
		<input id=name placeholder="Enter your username">
		<br>
		<button id=start>Begin your quest</button>
		<button id="build-mode-btn" onclick="startBuildMode(false,'4_4',{x:0,y:0,zoom:0.4})">Build Mode</button>
		<div style="margin-top:18px;border-top:1px solid #333;padding-top:14px;display:flex;gap:8px;">
			<a href="editor.html" style="flex:1;display:block;padding:8px;background:#0a0a1a;border:1px solid #2a2a5a;color:#7af;font-family:monospace;font-size:0.7em;letter-spacing:1px;text-decoration:none;transition:background .3s;">Shape Editor</a>
			<a href="beam_editor.html" style="flex:1;display:block;padding:8px;background:#0a1a0a;border:1px solid #2a5a2a;color:#5f8;font-family:monospace;font-size:0.7em;letter-spacing:1px;text-decoration:none;transition:background .3s;">Beam Editor</a>
		</div>
	</login>
	<lobby>
		<left>
			<h2>Players</h2><hr>
			<div id=players></div>
		</left>
		<main>
			<h2>Game</h2><hr>
			<button id=launch>Launch Game</button><br><br>
		</main>
	</lobby>
	<game>
		<canvas id=gamecanvas style="display:block;width:100%;height:100%;background:#03050d;"></canvas>
	</game>
	<script src="/shared/buildings.js"></script>
	<script src="polar-object.js"></script>
	<script src="main.js"></script>
	<script src="game.js"></script>
	<script src="build_system.js"></script>
</body>
</html>
